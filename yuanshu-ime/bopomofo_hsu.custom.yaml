patch:
  schema/version: "0.1"
  schema/description: |
    許氏輸入方案。
    精簡版，適合移動端匯入
  punctuator:
    __include: default:/punctuator
    full_shape:
      __include: default:/punctuator/full_shape
    half_shape:
      __include: default:/punctuator/half_shape
  recognizer:
    import_preset: default
    patterns:
      reverse_lookup: "`[a-z]*'?$"
  key_binder:
    import_preset: default
  editor:
    bindings:
      space: toggle_selection
      Return: commit_raw_input
      BackSpace: revert
      Escape: cancel
