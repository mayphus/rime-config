patch:
  schema/description: |
    第五代倉頡輸入法
    精簡版，適合移動端匯入
  engine/filters:
    - simplifier@simplify
    - reverse_lookup_filter@flypy_reverse_lookup
    - uniquifier
  punctuator:
    __include: default:/punctuator
    full_shape:
      __include: default:/punctuator/full_shape
    half_shape:
      __include: default:/punctuator/half_shape
  recognizer:
    import_preset: default
    patterns:
      reverse_lookup: "`[a-z]*;?$"
  key_binder:
    import_preset: default
  editor:
    bindings:
      space: confirm
      Return: commit_raw_input
      BackSpace: revert
      Escape: cancel
