# Rime schema settings
# encoding: utf-8

schema:
  schema_id: cangjie5
  name: 倉頡
  version: "0.30"
  author:
    - 發明人 朱邦復先生
  description: |
    第五代倉頡輸入法
    碼表源自倉頡之友發佈的《五倉世紀版》
    www.chinesecj.com
  dependencies:
    - flypy

switches:
  - name: ascii_mode
    states: [ 倉, A ]
    reset: 0
  - name: extended_charset
    states: [ 通用, 增廣 ]
    reset: 0
  - name: simplification
    states: [ 漢字, 汉字 ]
    reset: 0
  - name: full_shape
    states: [ 半角, 全角 ]
    reset: 0

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@reverse_lookup
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - script_translator@reverse_lookup
  filters:
    - simplifier@simplify
    - uniquifier
    - reverse_lookup_filter@flypy_reverse_lookup

simplify:
  option_name: simplification
  tips: all
  tags: [ abc ]

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " "
  auto_select: true

translator:
  dictionary: &dict
    cangjie5
  prism: cangjie5
  enable_user_dict: false
  enable_charset_filter: true
  enable_sentence: false
  sentence_over_completion: true
  preedit_format:
    - xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符|
  comment_format:
    - xlit|abcdefghijklmnopqrstuvwxyz~|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符・|

reverse_lookup:
  tag: reverse_lookup
  prefix: "`"
  suffix: ;
  dictionary: luna_pinyin
  prism: flypy
  preedit_format:
    __include: flypy:/flypy
  tips: 〔雙拼〕
  closing_tips: 〔蒼頡〕

flypy_reverse_lookup:
  tags: [ reverse_lookup ]
  dictionary: *dict
  overwrite_comment: true
  comment_format: &comment
    - xform/$/〕/
    - xform/^/〔/
    - xlit|abcdefghijklmnopqrstuvwxyz |日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符、|

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: comma, send: comma }
    - { when: has_menu, accept: period, send: period }

recognizer:
  import_preset: default
  patterns:
    email: ^[a-z][-_.0-9a-z]*@.*$
    url: ^(www[.]|https?:|ftp:|mailto:).*$
    reverse_lookup: "`[a-z]*;?$"
    punct: ^/[0-9]?[a-z]*$
