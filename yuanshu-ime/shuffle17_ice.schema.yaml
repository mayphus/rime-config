# Rime schema
# encoding: utf-8

schema:
  schema_id: shuffle17_ice
  name: 亂序17
  version: "0.1"
  author:
    - layout reference from Log Input docs
    - dictionary import from iDvel/rime-ice
    - Rime schema adapted in this workspace
  description: |
    朙月拼音＋亂序17方案，使用 rime-ice 詞庫。
    移動端優先，17 鍵內碼採用 a-q。
  dependencies:
    - cangjie6

switches:
  - name: ascii_mode
    reset: 0
    states: ["17", "A"]
  - name: simplification
    states: [ 漢字, 汉字 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - reverse_lookup_translator
    - script_translator
  filters:
    - simplifier
    - uniquifier

speller:
  alphabet: abcdefghijklmnopq
  delimiter: " '"
  algebra:
    # Zero-initial syllables use the q~ guide key first.
    - xform/^(a|ai|an|ang|ao|e|ei|en|eng|er|o|ou)$/N$1/

    # Normalize pinyin orthography to the final groups used by the 17-key chart.
    - xform/^ya$/yia/
    - xform/^yan$/yian/
    - xform/^yang$/yiang/
    - xform/^yao$/yiao/
    - xform/^ye$/yie/
    - xform/^you$/yiu/
    - xform/^yong$/yiong/
    - xform/^wa$/wua/
    - xform/^wai$/wuai/
    - xform/^wan$/wuan/
    - xform/^wang$/wuang/
    - xform/^wo$/wuo/
    - xform/^wei$/wui/
    - xform/^wen$/wun/
    - xform/^([jqxy])u$/$1v/

    # Initial groups.
    - xform/^sh/B/
    - xform/^zh/C/
    - xform/^ch/M/
    - xform/^(h|p)/A/
    - xform/^b/D/
    - xform/^x/E/
    - xform/^(s|m)/F/
    - xform/^l/G/
    - xform/^d/H/
    - xform/^y/I/
    - xform/^(w|z)/J/
    - xform/^(j|k)/K/
    - xform/^(r|n)/L/
    - xform/^q/N/
    - xform/^g/O/
    - xform/^(c|f)/P/
    - xform/^t/Q/

    # Final groups. Longer patterns must be handled first.
    - xform/(iang|ui)$/M/
    - xform/(uang|ian)$/N/
    - xform/iong$/D/
    - xform/iao$/C/
    - xform/(uai|uan)$/E/
    - xform/(ie|uo)$/F/
    - xform/(ue|ai)$/G/
    - xform/(eng|ing)$/I/
    - xform/(iu|ou)$/P/
    - xform/(er|ong)$/Q/
    - xform/(ia|ua)$/A/
    - xform/(en|in)$/B/
    - xform/ao$/D/
    - xform/ang$/C/
    - xform/(ei|un)$/O/
    - xform/(o|v)$/E/
    - xform/a$/A/
    - xform/u$/H/
    - xform/e$/J/
    - xform/i$/K/
    - xform/an$/L/

    # Convert intermediate key ids to the exported a-q internal alphabet.
    - xlit/ABCDEFGHIJKLMNOPQ/abcdefghijklmnopq/

translator:
  dictionary: rime_ice
  prism: shuffle17_ice

reverse_lookup:
  dictionary: cangjie6
  enable_completion: true
  prefix: "`"
  suffix: "'"
  tips: "〔蒼頡〕"
  preedit_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|"
  comment_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|"

punctuator:
  import_preset: default

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*'?$"
