name: deploy-engine

on:
  push:
    branches:
      - main
    paths:
      - "engine/**"
      - "deploy/k8s/**"
      - ".github/workflows/deploy-engine.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Build and Deploy Engine
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/mayphus/rime-config-engine
      IMAGE_TAG: ${{ github.sha }}
      K8S_API_SERVER: https://100.116.247.67:6443
    steps:
      - name: Checkout rime-config
        uses: actions/checkout@v6.0.2

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: ./engine
          file: ./engine/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          hostname: github-actions-rime-config
          ping: 100.116.247.67

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Write kubeconfig
        shell: bash
        run: |
          mkdir -p "$HOME/.kube"
          printf '%s' '${{ secrets.KUBECONFIG_PB62 }}' > "$HOME/.kube/config"
          perl -0pi -e 's|server: https://[^\s]+:6443|server: $ENV{K8S_API_SERVER}|g' "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Deploy manifests
        shell: bash
        run: |
          kubectl apply -k deploy/k8s
          kubectl -n rime-config set image deployment/rime-config-engine engine=${IMAGE_NAME}:${IMAGE_TAG}
          kubectl -n rime-config rollout status deployment/rime-config-engine --timeout=180s
