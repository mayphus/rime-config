name: update-dicts

on:
  schedule:
    - cron: "30 20 * * 0"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-dicts
  cancel-in-progress: false

jobs:
  update:
    name: Update dictionaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rime-config
        uses: actions/checkout@v6.0.2

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: stable

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Setup Clojure
        uses: DeLaGuardo/setup-clojure@13.6.0
        with:
          cli: 1.12.0.1530

      - name: Update dictionary files
        run: racket -e '(require "engine/tools/update-dicts.rkt") (update-dicts!)'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun run test

      - name: Validate generated profiles
        run: racket -e '(require "build.rkt") (build-profile! "desktop") (build-profile! "yuanshu/all")'

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/update-rime-dicts
          commit-message: "chore: update rime dictionaries"
          title: "chore: update rime dictionaries"
          body: |
            Automated refresh of vendored Rime dictionary data.

            Validation:
            - `bun run test`
            - `racket -e '(require "build.rkt") (build-profile! "desktop") (build-profile! "yuanshu/all")'`
          add-paths: |
            engine/data/**
