name: update-dicts

on:
  schedule:
    - cron: "30 20 * * 0"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-dicts
  cancel-in-progress: false

jobs:
  update:
    name: Update dictionaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout rime-config
        uses: actions/checkout@v6.0.2

      - name: Setup Racket
        uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: x64
          distribution: full
          variant: CS
          version: stable

      - name: Update dictionary files
        run: racket -e '(require "tools/update-dicts.rkt") (update-dicts!)'

      - name: Run Racket tests
        run: raco test test

      - name: Check generated k8s manifests
        run: racket -e '(require "deploy/k8s/manifests.rkt") (check-k8s!)'

      - name: Validate generated profiles
        run: racket -e '(require "build.rkt") (build-profile! "desktop") (build-profile! "yuanshu/all")'

      - name: Create update pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: codex/update-rime-dicts
          commit-message: "chore: update rime dictionaries"
          title: "chore: update rime dictionaries"
          body: |
            Automated refresh of vendored Rime dictionary data.

            Validation:
            - `raco test test`
            - `racket -e '(require "build.rkt") (build-profile! "desktop") (build-profile! "yuanshu/all")'`
          add-paths: |
            data/**
