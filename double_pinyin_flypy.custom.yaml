patch:
  "switches/@0/reset": 1
  "switches/@0/states": ["ㄓ", "En"]
  "reverse_lookup/dictionary": cangjie5
  "reverse_lookup/tips": "〔倉頡五代〕"
  "reverse_lookup/preedit_format": []
  "reverse_lookup/comment_format":
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符|"
  "translator/preedit_format":
    # 1. Flypy Double Pinyin to Pinyin (Standard)
    - xform/([bpmfdtnljqx])n/$1iao/
    - xform/(\w)g/$1eng/
    - xform/(\w)q/$1iu/
    - xform/(\w)w/$1ei/
    - xform/([dtnlgkhjqxyvuirzcs])r/$1uan/
    - xform/(\w)t/$1ve/
    - xform/(\w)y/$1un/
    - xform/([dtnlgkhvuirzcs])o/$1uo/
    - xform/(\w)p/$1ie/
    - xform/([jqx])s/$1iong/
    - xform/(\w)s/$1ong/
    - xform/(\w)d/$1ai/
    - xform/(\w)f/$1en/
    - xform/(\w)h/$1ang/
    - xform/(\w)j/$1an/
    - xform/([gkhvuirzcs])k/$1uai/
    - xform/(\w)k/$1ing/
    - xform/([jqxnl])l/$1iang/
    - xform/(\w)l/$1uang/
    - xform/(\w)z/$1ou/
    - xform/([gkhvuirzcs])x/$1ua/
    - xform/(\w)x/$1ia/
    - xform/(\w)c/$1ao/
    - xform/([dtgkhvuirzcs])v/$1ui/
    - xform/(\w)b/$1in/
    - xform/(\w)m/$1ian/
    - xform/([aoe])\1(\w)/$1$2/
    - "xform/(^|[ '])v/$1zh/"
    - "xform/(^|[ '])i/$1ch/"
    - "xform/(^|[ '])u/$1sh/"
    - xform/([jqxy])v/$1u/
    - xform/([nl])v/$1ü/

    # 2. Duplicate and add parentheses with a tab separator for cursor placement
    - "xform/^(.+)$/$1\t($1)/"

    # 3. Pinyin to Bopomofo (Only inside parentheses)
    - "xform/(\\([^)]*)([zcsr]h?|r)i([^)]*\\))/$1$2$3/" # zhi/chi/shi/ri/zi/ci/si
    - "xform/(\\([^)]*)zh([^)]*\\))/$1ㄓ$2/"
    - "xform/(\\([^)]*)ch([^)]*\\))/$1ㄔ$2/"
    - "xform/(\\([^)]*)sh([^)]*\\))/$1ㄕ$2/"
