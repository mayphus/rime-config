patch:
  "switches/@0/reset": 1
  "switches/@0/states": ["鶴", "A"]
  "reverse_lookup/dictionary": cangjie5
  "reverse_lookup/tips": "〔倉頡五代〕"
  "reverse_lookup/preedit_format": []
  "reverse_lookup/comment_format":
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土竹戈十大中一弓人心手口尸廿山女田難卜符|"
  "translator/preedit_format":
    # 1. Flypy Double Pinyin to Pinyin (Standard)
    - xform/([bpmfdtnljqx])n/$1iao/
    - xform/(\w)g/$1eng/
    - xform/(\w)q/$1iu/
    - xform/(\w)w/$1ei/
    - xform/([dtnlgkhjqxyvuirzcs])r/$1uan/
    - xform/(\w)t/$1ve/
    - xform/(\w)y/$1un/
    - xform/([dtnlgkhvuirzcs])o/$1uo/
    - xform/(\w)p/$1ie/
    - xform/([jqx])s/$1iong/
    - xform/(\w)s/$1ong/
    - xform/(\w)d/$1ai/
    - xform/(\w)f/$1en/
    - xform/(\w)h/$1ang/
    - xform/(\w)j/$1an/
    - xform/([gkhvuirzcs])k/$1uai/
    - xform/(\w)k/$1ing/
    - xform/([jqxnl])l/$1iang/
    - xform/(\w)l/$1uang/
    - xform/(\w)z/$1ou/
    - xform/([gkhvuirzcs])x/$1ua/
    - xform/(\w)x/$1ia/
    - xform/(\w)c/$1ao/
    - xform/([dtgkhvuirzcs])v/$1ui/
    - xform/(\w)b/$1in/
    - xform/(\w)m/$1ian/
    - xform/([aoe])\1(\w)/$1$2/
    - "xform/(^|[ '])v/$1zh/"
    - "xform/(^|[ '])i/$1ch/"
    - "xform/(^|[ '])u/$1sh/"
    - xform/([jqxy])v/$1u/
    - xform/([nl])v/$1ü/

    # 2. Duplicate and add parentheses with a tab separator
    - "xform/^(.+)$/$1\t($1)/"

    # 3. Refined Pinyin to Bopomofo (Inside parentheses only)
    - "xform/(\\([^)]*)[nl]ue([^)]*\\))/$1$2vE$3/"
    - "xform/(\\([^)]*)([jqxy])u([^)]*\\))/$1$2$3v/"
    - "xform/(\\([^)]*)iu([^)]*\\))/$1ㄧㄡ$2/"
    - "xform/(\\([^)]*)ui([^)]*\\))/$1ㄨㄟ$2/"
    - "xform/(\\([^)]*)ong([^)]*\\))/$1ㄨㄥ$2/"
    - "xform/(\\([^)]*)v([^)]*)n([^)]*\\))/$1v$2en$3/"
    - "xform/(\\([^)]*)zhi?([^)]*\\))/$1ㄓ$2/"
    - "xform/(\\([^)]*)chi?([^)]*\\))/$1ㄔ$2/"
    - "xform/(\\([^)]*)shi?([^)]*\\))/$1ㄕ$2/"
    - "xform/(\\([^)]*)ri?([^)]*\\))/$1ㄖ$2/"
    - "xform/(\\([^)]*)zi?([^)]*\\))/$1ㄗ$2/"
    - "xform/(\\([^)]*)ci?([^)]*\\))/$1ㄘ$2/"
    - "xform/(\\([^)]*)si?([^)]*\\))/$1ㄙ$2/"
    - "xform/(\\([^)]*)ai([^)]*\\))/$1ㄞ$2/"
    - "xform/(\\([^)]*)ei([^)]*\\))/$1ㄟ$2/"
    - "xform/(\\([^)]*)ao([^)]*\\))/$1ㄠ$2/"
    - "xform/(\\([^)]*)ou([^)]*\\))/$1ㄡ$2/"
    - "xform/(\\([^)]*)ang([^)]*\\))/$1ㄤ$2/"
    - "xform/(\\([^)]*)eng([^)]*\\))/$1ㄥ$2/"
    - "xform/(\\([^)]*)an([^)]*\\))/$1ㄢ$2/"
    - "xform/(\\([^)]*)en([^)]*\\))/$1ㄣ$2/"
    - "xform/(\\([^)]*)er([^)]*\\))/$1ㄦ$2/"
    - "xform/(\\([^)]*)eh([^)]*\\))/$1ㄝ$2/"
    - "xform/(\\([^)]*)ia([^)]*\\))/$1ㄧㄚ$2/"
    - "xform/(\\([^)]*)ie([^)]*\\))/$1ㄧㄝ$2/"
    - "xform/(\\([^)]*)ua([^)]*\\))/$1ㄨㄚ$2/"
    - "xform/(\\([^)]*)uo([^)]*\\))/$1ㄨㄛ$2/"
    - "xform/(\\([^)]*)ve([^)]*\\))/$1ㄩㄝ$2/"
    - "xform/(\\([^)]*)v([^)]*\\))/$1ㄩ$2/"
    - "xform/(\\([^)]*)i([^)]*\\))/$1ㄧ$2/"
    - "xform/(\\([^)]*)u([^)]*\\))/$1ㄨ$2/"
    - "xform/(\\([^)]*)a([^)]*\\))/$1ㄚ$2/"
    - "xform/(\\([^)]*)o([^)]*\\))/$1ㄛ$2/"
    - "xform/(\\([^)]*)e([^)]*\\))/$1ㄜ$2/"
    # 4. Final mapping for any leftover Pinyin letters to Bopomofo
    - "xlit|bpmfdtnlgkhjqx|ㄅㄆㄇㄈㄉㄊㄋㄌㄍㄎㄏㄐㄑㄒ|"
