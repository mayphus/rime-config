# Rime schema
# encoding: utf-8

schema:
  name: 蒼頡檢字法
  schema_id: cangjie6
  version: "0.2"
  author:
    - 朱邦復先生
    - 沈紅蓮女士
  description: |
    第六代倉頡輸入法
    碼表由雪齋、惜緣和crazy4u整理
  dependencies:
    - double_pinyin_flypy

switches:
  - name: extended_charset
    states: [ 通用, 增廣 ]
    reset: 1
  - name: simplification
    states: [ 漢字, 汉字 ]
    reset: 0
  - name: ascii_mode
    states: [ 蒼, A ]
    reset: 1
  - name: full_shape
    states: [ 半角, 全角 ]
    reset: 0

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@flypy
    - affix_segmentor@reverse_lookup
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - script_translator@flypy
    - script_translator@reverse_lookup
  filters:
    - simplifier@simplify
    - charset_filter@extended_char
    - uniquifier
    - reverse_lookup_filter@flypy_reverse_lookup

simplify:
  option_name: simplification
  tips: all
  tags: [ abc, flypy ]

extended_char:
  option_name: extended_charset
  tags: [ abc ]

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"

translator:
  dictionary: &dict
    cangjie6.extended
  enable_user_dict: true
  enable_sentence: true
  sentence_over_completion: true
  enable_encoder: true
  encode_commit_history: true
  max_phrase_length: 5
  preedit_format:
    - xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|
  comment_format:
    - xlit|abcdefghijklmnopqrstuvwxyz~|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片・|
  initial_quality: 0.75	# 調整該編譯器出字優先度

flypy:
  tag: flypy
  dictionary: luna_pinyin
  prism: double_pinyin_flypy
  prefix: P
  suffix: ;
  preedit_format: &flypy
    - xform/([bpmfdtnljqx])n/$1iao/
    - xform/(\w)g/$1eng/
    - xform/(\w)q/$1iu/
    - xform/(\w)w/$1ei/
    - xform/([dtnlgkhjqxyvuirzcs])r/$1uan/
    - xform/(\w)t/$1ve/
    - xform/(\w)y/$1un/
    - xform/([dtnlgkhvuirzcs])o/$1uo/
    - xform/(\w)p/$1ie/
    - xform/([jqx])s/$1iong/
    - xform/(\w)s/$1ong/
    - xform/(\w)d/$1ai/
    - xform/(\w)f/$1en/
    - xform/(\w)h/$1ang/
    - xform/(\w)j/$1an/
    - xform/([gkhvuirzcs])k/$1uai/
    - xform/(\w)k/$1ing/
    - xform/([jqxnl])l/$1iang/
    - xform/(\w)l/$1uang/
    - xform/(\w)z/$1ou/
    - xform/([gkhvuirzcs])x/$1ua/
    - xform/(\w)x/$1ia/
    - xform/(\w)c/$1ao/
    - xform/([dtgkhvuirzcs])v/$1ui/
    - xform/(\w)b/$1in/
    - xform/(\w)m/$1ian/
    - xform/([aoe])\1(\w)/$1$2/
    - "xform/(^|[ '])v/$1zh/"
    - "xform/(^|[ '])i/$1ch/"
    - "xform/(^|[ '])u/$1sh/"
    - xform/([jqxy])v/$1u/
    - xform/([nl])v/$1ü/
  tips: 【小鶴雙拼】
  closing_tips: 【蒼頡】
  initial_quality: 0.2	# 調整該編譯器出字優先度

abc_segmentor:
  extra_tags: [ flypy ]

reverse_lookup:
  tag: reverse_lookup
  prefix: "`"
  suffix: ;
  dictionary: luna_pinyin
  prism: double_pinyin_flypy
  preedit_format: *flypy
  tips: 【小鶴雙拼反查】
  closing_tips: 【蒼頡】

flypy_reverse_lookup:
  tags: [ reverse_lookup ]
  dictionary: *dict
  overwrite_comment: true  # 覆蓋其他提示
  comment_format: &comment
    - xform/$/〕/
    - xform/^/〔/
    - xlit|abcdefghijklmnopqrstuvwxyz |日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片、|

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    email: ^[a-z][-_.0-9a-z]*@.*$
    url: ^(www[.]|https?:|ftp:|mailto:).*$
    reverse_lookup: "`[a-z]*;?$"
    flypy: (?<!`)P[a-z']*;?$
    punct: ^/[0-9]?[a-z]*$
