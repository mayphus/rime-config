# Rime schema settings
# encoding: utf-8

schema:
  name: 蒼頡檢字法
  schema_id: cangjie6
  version: "0.1"
  author:
    - 朱邦復先生
    - 沈紅蓮女士
  description: |
    第六代蒼頡檢字法
    碼表源自風易辭，雪齋、惜緣和crazy4u整理
    快打模式：單字自動上屏無連打
  dependencies:
    - double_pinyin_flypy

switches:
  - name: extended_charset
    states: [ 通用, 增廣 ]
    reset: 0
  - name: simplification
    states: [ 漢字, 汉字 ]
    reset: 0
  - name: ascii_mode
    states: [ 蒼, A ]
    reset: 1
  - name: full_shape
    states: [ 半角, 全角 ]
    reset: 0

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@reverse_lookup
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - script_translator@reverse_lookup
  filters:
    - simplifier@simplify
    - uniquifier
    - reverse_lookup_filter@flypy_reverse_lookup

simplify:
  option_name: simplification
  tips: all
  tags: [ abc ]

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " "
  auto_select: true

translator:
  dictionary: &dict
    cangjie6
  prism: cangjie6
  enable_user_dict: true
  user_dict: cangjie6
  enable_charset_filter: true
  enable_sentence: false
  sentence_over_completion: true
  preedit_format:
    - xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|
  comment_format:
    - xlit|abcdefghijklmnopqrstuvwxyz~|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片・|

reverse_lookup:
  tag: reverse_lookup
  prefix: "`"
  suffix: ;
  dictionary: luna_pinyin
  prism: double_pinyin_flypy
  preedit_format:
    __include: flypy_preedit:/flypy_preedit
  tips: 【小鶴雙拼反查】
  closing_tips: 【蒼頡】

flypy_reverse_lookup:
  tags: [ reverse_lookup ]
  dictionary: *dict
  overwrite_comment: true
  comment_format: &comment
    - xform/$/〕/
    - xform/^/〔/
    - xlit|abcdefghijklmnopqrstuvwxyz |日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片、|

punctuator:
  import_preset: symbols

key_binder:
  import_preset: default
  bindings:
    - { when: has_menu, accept: comma, send: comma }
    - { when: has_menu, accept: period, send: period }

recognizer:
  import_preset: default
  patterns:
    email: ^[a-z][-_.0-9a-z]*@.*$
    url: ^(www[.]|https?:|ftp:|mailto:).*$
    reverse_lookup: "`[a-z]*;?$"
    punct: ^/[0-9]?[a-z]*$
