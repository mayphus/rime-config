# Rime schema
# encoding: utf-8

schema:
  schema_id: jyut6ping3
  name: 粵語拼音
  version: "2024.12.01.custom"
  author:
    - Ayaka Mikazuki <ayaka@mail.shn.hk>
    - LeiMaau <leimaau@qq.com>
    - chaaklau <chaakming@gmail.com>
    - laubonghaudoi <laubonghaudoi@icloud.com>
    - tanxpyox <tanxpyox@gmail.com>
    - William915 <William915@gmail.com>
    - szc126 (@szc126)
    - Bing ZHEUNG <bing@zheung.org>
    - graphemecluster <graphemecluster@gmail.com>

  description: |-
    採用香港語言學學會粵語拼音方案
    已整合蒼頡六代反查及教師模式。

  dependencies:
    - cangjie6

switches:
  - name: ascii_mode
    reset: 1
    states: [ 粵, A ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - options: [ noop, variants_hk, trad_tw, simplification ]
    states: [ 傳統漢字, 香港傳統漢字, 臺灣傳統漢字, 大陆简化汉字 ]
    reset: 1
  - name: ascii_punct
    states: [ 。，, ．， ]
  - name: emoji_cantonese_suggestion
    states: [ 冇 Emoji, 有 Emoji ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@cangjie6
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - table_translator@cangjie6
  filters:
    - simplifier@emoji_cantonese_suggestion
    - simplifier
    - simplifier@variants_hk
    - simplifier@trad_tw
    - uniquifier


speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    - derive/^([aeiou])/q$1/
    - derive/^jy?([aeiou])/y$1/
    - derive/^jyu/ju/
    - derive/yu(?!ng|k)/y/
    - derive/(g|k)u(?!ng|k)/$1wu/
    - derive/eoi(?=\d)/eoy/
    - derive/eo/oe/
    - derive/oe/eo/
    - derive/aa(?=\d)/a/
    - derive/\d//

    - abbrev/^([a-z]).+$/$1/

    - xform/1/v/
    - xform/4/vv/
    - xform/2/x/
    - xform/5/xx/
    - xform/3/q/
    - xform/6/qq/

translator:
  dictionary: jyut6ping3
  spelling_hints: 8
  preedit_format:
    - xform/([aeiouymngptk])vv/${1}4/
    - xform/([aeiouymngptk])xx/${1}5/
    - xform/([aeiouymngptk])qq/${1}6/
    - xform/([aeiouymngptk])v/${1}1/
    - xform/([aeiouymngptk])x/${1}2/
    - xform/([aeiouymngptk])q/${1}3/

cangjie6:
  tag: cangjie6
  dictionary: cangjie6
  enable_user_dict: false
  prefix: "`"
  suffix: ";"
  tips: "〔蒼頡檢字法〕"
  preedit_format:
    - 'xform/^([a-z]*)$/$1\t（\U$1\E）/'
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|"
  comment_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|"


variants_hk:
  option_name: variants_hk
  opencc_config: t2hkf.json

trad_tw:
  option_name: trad_tw
  opencc_config: t2tw.json

emoji_cantonese_suggestion:
  opencc_config: emoji_cantonese.json
  option_name: emoji_cantonese_suggestion
  tips: none
  inherit_comment: false

punctuator:
  import_preset: symbols_cantonese

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    cangjie6: "^`[a-z']*;?$"

__patch:
  - grammar:/hant?
  - jyut6ping3.custom:/patch?
