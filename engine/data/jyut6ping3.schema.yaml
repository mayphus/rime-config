# Rime schema
# encoding: utf-8

schema:
  schema_id: jyut6ping3
  name: 粵拼
  version: "2024.12.01"
  author:
    - Ayaka Mikazuki <ayaka@mail.shn.hk>
    - LeiMaau <leimaau@qq.com>
    - chaaklau <chaakming@gmail.com>
    - laubonghaudoi <laubonghaudoi@icloud.com>
    - tanxpyox <tanxpyox@gmail.com>
    - William915 <William915@gmail.com>
    - szc126 (@szc126)
    - Bing ZHEUNG <bing@zheung.org>
    - graphemecluster <graphemecluster@gmail.com>

  description: |-
    採用香港語言學學會粵語拼音方案
    https://www.lshk.org/jyutping
    支援聲調顯示同輸入
    Telegram 用户交流組 https://t.me/rime_cantonese

  dependencies:
    - flypy
    - cangjie6

switches:
  - name: ascii_mode
    reset: 0
    states: [ 粵, A ]
  - name: simplification
    reset: 0
    states: [ 漢字, 汉字 ]
  - name: full_shape
    states: [ 半角, 全角 ]
  - name: ascii_punct
    states: [ 。，, ．， ]

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - affix_segmentor@flypy
    - affix_segmentor@cangjie6
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - script_translator
    - script_translator@flypy
    - table_translator@cangjie6
  filters:
    - simplifier
    - uniquifier
    - reverse_lookup_filter@jyut6ping3_reverse_lookup

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " '"
  algebra:
    # 取消下兩行註釋（移除 # 號），支援疑影交替： ng- 通 Ø-，Ø- 通 ng-
    #- derive/^ng([aeiou])/$1/
    #- derive/^([aeiou])/ng$1/

    # 取消下行註釋，支援泥來合流： n- 併入 l- ，如「你」讀若「理」
    #- derive/^n(?!g)/l/

    # 取消下行註釋，支援圓唇輔音合口韻缺位：韻母 o 之前 gw-, kw- 併入 g-, k- ，如「國」讀若「各」、「廓」讀若「確」
    #- derive/^(g|k)wo/$1o/

    # 取消下行註釋，支援獨立鼻音韻 ng 併入 m，如「吳」讀若「唔」
    #- derive/^ng(?=\d)/m/

    # 取消下兩行註釋，支援韻尾 -n、-ng 交替，如「恒生」讀若「痕身」
    #- derive/n(?=\d)/ng/
    #- derive/ng(?=\d)/n/

    # 取消下兩行註釋，支援韻尾 –t、-k 交替，如「北」讀若「不」
    #- derive/t(?=\d)/k/
    #- derive/k(?=\d)/t/

    # 取消下兩行註釋，支援韻尾 –m、-n 交替，如「點」讀 din2
    #- derive/m(?=\d)/n/
    #- derive/n(?=\d)/m/

    # 取消下兩行註釋，支援韻尾 –p、-t 交替，如「碟」讀 dit2
    #- derive/p(?=\d)/t/
    #- derive/t(?=\d)/p/

    - derive/^([aeiou])/q$1/      # 增加 q 表示喉塞
    - derive/^jy?([aeiou])/y$1/   # 容錯 je -> ye, jyu -> yu
    - derive/^jyu/ju/             # 容錯 jyu -> ju
    - derive/yu(?!ng|k)/y/        # 容錯 yu -> y
    - derive/(g|k)u(?!ng|k)/$1wu/ # 輔音圓唇
    - derive/eoi(?=\d)/eoy/       # 容錯
    - derive/eo/oe/               # 容錯 eo/oe 不分
    - derive/oe/eo/               # 容錯 eo/oe 不分
    - derive/aa(?=\d)/a/          # 容錯
    - derive/\d//                 # 忽略聲調

    - abbrev/^([a-z]).+$/$1/      # 首字母簡拼

    - xform/1/v/                  # 陰平
    - xform/4/vv/                 # 陽平
    - xform/2/x/                  # 陰上
    - xform/5/xx/                 # 陽上
    - xform/3/q/                  # 陰去
    - xform/6/qq/                 # 陽去

translator:
  dictionary: jyut6ping3
  spelling_hints: 8  # 將呢度改作 0，可以去除候選字後邊嘅粵拼提示
  preedit_format:
    - xform/([aeiouymngptk])vv/${1}4/
    - xform/([aeiouymngptk])xx/${1}5/
    - xform/([aeiouymngptk])qq/${1}6/
    - xform/([aeiouymngptk])v/${1}1/
    - xform/([aeiouymngptk])x/${1}2/
    - xform/([aeiouymngptk])q/${1}3/

flypy:
  tag: flypy
  dictionary: luna_pinyin
  prism: flypy
  prefix: "`"
  suffix: ";"
  tips: 〔雙拼〕
  preedit_format:
    __include: flypy:/flypy

cangjie6:
  tag: cangjie6
  dictionary: cangjie6
  enable_user_dict: false
  prefix: "v"
  suffix: ";"
  tips: 〔蒼頡〕
  preedit_format:
    - 'xform/^([a-z]*)$/$1\t（\U$1\E）/'
    - "xlit|ABCDEFGHIJKLMNOPQRSTUVWXYZ|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|"
  comment_format:
    - "xlit|abcdefghijklmnopqrstuvwxyz~|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片・|"

jyut6ping3_reverse_lookup:
  tags: [ flypy, cangjie6 ]
  overwrite_comment: false
  dictionary: jyut6ping3

punctuator:
  import_preset: symbols_cantonese

key_binder:
  import_preset: default

recognizer:
  import_preset: default
  patterns:
    punct: "^/([0-9]0?|[a-z]+)$"
    flypy: "^`[a-z']*;?$"
    cangjie6: "^v[a-z]*;?$"

__patch:
  # 使用八股文語言模型
  - grammar:/hant?
