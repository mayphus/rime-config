apiVersion: apps/v1
kind: Deployment
metadata:
  name: rime-config
  namespace: rime-config
  labels:
    app: rime-config
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: rime-config
  template:
    metadata:
      labels:
        app: rime-config
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: app
          image: ghcr.io/mayphus/rime-config:latest
          imagePullPolicy: Always
          env:
            - name: PORT
              value: "8080"
            - name: LISTEN_IP
              value: "0.0.0.0"
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /metadata
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metadata
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
