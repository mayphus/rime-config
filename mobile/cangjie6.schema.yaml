# Rime schema settings
# encoding: utf-8

schema:
  schema_id: cangjie6
  name: 蒼頡
  version: "0.1"
  author:
    - 朱邦復先生
    - 沈紅蓮女士
  description: |
    第六代蒼頡檢字法
    精簡版，適合移動端匯入
  dependencies:
    - flypy

switches:
  - name: ascii_mode
    states: [ 蒼, A ]
    reset: 0
  - options:
      - zh_none
      - zh_hans
      - zh_hant
    reset: 0
    states: [ 混合, 简体, 繁體 ]
  - name: full_shape
    states: [ 半角, 全角 ]
    reset: 0

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - affix_segmentor@reverse_lookup
    - punct_segmentor
    - fallback_segmentor
  translators:
    - punct_translator
    - table_translator
    - script_translator@reverse_lookup
  filters:
    - simplifier@zh_hans
    - simplifier@zh_hant
    - reverse_lookup_filter@flypy_reverse_lookup
    - uniquifier

punctuator:
  __include: default:/punctuator
  full_shape:
    __include: default:/punctuator/full_shape
  half_shape:
    __include: default:/punctuator/half_shape

recognizer:
  import_preset: default
  patterns:
    reverse_lookup: "`[a-z]*;?$"

key_binder:
  import_preset: default

editor:
  bindings:
    space: confirm
    Return: commit_raw_input
    BackSpace: revert
    Escape: cancel

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcba
  delimiter: " "
  auto_select: true

translator:
  dictionary: cangjie6.extended
  prism: cangjie6
  enable_user_dict: false
  enable_sentence: false
  sentence_over_completion: true
  preedit_format:
    - xlit|abcdefghijklmnopqrstuvwxyz|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片|
  comment_format:
    - xlit|abcdefghijklmnopqrstuvwxyz~|日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片・|

reverse_lookup:
  tag: reverse_lookup
  prefix: "`"
  suffix: ;
  dictionary: luna_pinyin
  prism: flypy
  tips: 〔雙拼〕
  closing_tips: 〔蒼頡〕

flypy_reverse_lookup:
  tags: [ reverse_lookup ]
  dictionary: cangjie6.extended
  overwrite_comment: true
  comment_format:
    - xform/$/〕/
    - xform/^/〔/
    - xlit|abcdefghijklmnopqrstuvwxyz |日月金木水火土的戈十大中一弓人心手口尸廿山女田止卜片、|

zh_hans:
  option_name: zh_hans
  opencc_config: t2s.json
  tips: all
  tags: [ abc ]

zh_hant:
  option_name: zh_hant
  opencc_config: s2t.json
  tips: all
  tags: [ abc ]
